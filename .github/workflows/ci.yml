name: CI

on:
  push:
    branches: [main, develop, "DOM-*"]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate docker-compose
        run: docker compose config --quiet

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v7
      - name: Verify compose builds
        run: docker compose build --dry-run 2>/dev/null || docker compose config --quiet
